<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RSA 加密网站</title>
    <style>
:root {
  --bg: #eaf6f8;
  --panel: #ffffff;
  --ink: #0d1726;
  --muted: #536477;
  --line: #b8dfdd;
  --accent: #00a7a5;
  --accent-dark: #073b45;
  --accent-soft: #dcfbfb;
  --cyan: #5ff7f2;
  --gold: #ffc857;
  --gold-soft: #fff3cf;
  --danger: #b42318;
  --danger-soft: #ffe8e5;
  --success: #15803d;
  --success-soft: #dcfce7;
  --shadow: 0 22px 70px rgba(0, 75, 90, 0.16);
  --glow: 0 0 28px rgba(0, 167, 165, 0.2);
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  color: var(--ink);
  background:
    radial-gradient(circle at 8% 0%, rgba(95, 247, 242, 0.28), transparent 28%),
    radial-gradient(circle at 92% 12%, rgba(255, 200, 87, 0.22), transparent 24%),
    linear-gradient(90deg, rgba(0, 167, 165, 0.1) 1px, transparent 1px),
    linear-gradient(180deg, rgba(0, 167, 165, 0.1) 1px, transparent 1px),
    linear-gradient(180deg, var(--bg) 0%, #f8fdfd 46%, #f3f8f8 100%);
  background-size:
    auto,
    auto,
    42px 42px,
    42px 42px,
    auto;
  font-family:
    "Microsoft YaHei",
    "Segoe UI",
    Arial,
    sans-serif;
}

button,
textarea {
  font: inherit;
}

a {
  color: inherit;
  text-decoration: none;
}

.signature-bar {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  min-height: 62px;
  overflow: hidden;
  padding: 14px clamp(18px, 4vw, 54px);
  color: #f3fffd;
  border-bottom: 1px solid rgba(95, 247, 242, 0.3);
  background:
    linear-gradient(90deg, rgba(95, 247, 242, 0.12) 1px, transparent 1px),
    linear-gradient(135deg, #062d35 0%, #075662 48%, #0b776e 100%);
  background-size:
    28px 28px,
    auto;
  box-shadow: 0 12px 34px rgba(0, 75, 90, 0.24);
  font-size: 16px;
  font-weight: 900;
}

.signature-bar::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, transparent, rgba(95, 247, 242, 0.22), transparent);
  transform: translateX(-65%);
}

.signature-bar span {
  position: relative;
  z-index: 1;
}

.signature-bar span:first-child {
  font-size: clamp(20px, 2vw, 26px);
  letter-spacing: 0;
  text-shadow: 0 0 18px rgba(95, 247, 242, 0.62);
}

.signature-bar span:last-child {
  color: #e9fffb;
  font-family: Consolas, "Cascadia Mono", "Microsoft YaHei", monospace;
  font-size: 16px;
}

.top-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  padding: 16px clamp(18px, 4vw, 54px);
  border-bottom: 1px solid rgba(0, 167, 165, 0.24);
  background: rgba(248, 255, 254, 0.88);
  backdrop-filter: blur(10px);
}

.brand {
  color: var(--accent-dark);
  font-size: 22px;
  font-weight: 900;
  text-shadow: 0 0 16px rgba(0, 167, 165, 0.18);
}

.top-nav div {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 8px;
}

.top-nav a:not(.brand) {
  border-radius: 999px;
  padding: 8px 13px;
  color: var(--muted);
  font-weight: 800;
}

.top-nav a.active,
.top-nav a:not(.brand):hover {
  color: var(--accent-dark);
  box-shadow: inset 0 0 0 1px rgba(0, 167, 165, 0.18), var(--glow);
  background: linear-gradient(135deg, var(--accent-soft), #ffffff);
}

.home-hero,
.page-hero {
  padding: 48px clamp(18px, 4vw, 54px) 36px;
  border-bottom: 1px solid rgba(0, 167, 165, 0.22);
  background:
    linear-gradient(115deg, rgba(255, 255, 255, 0.96), rgba(226, 251, 249, 0.9) 58%, rgba(255, 243, 207, 0.72)),
    linear-gradient(90deg, rgba(0, 167, 165, 0.18), transparent);
}

.page-hero {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 24px;
}

.eyebrow {
  margin: 0 0 10px;
  color: var(--accent);
  font-size: 13px;
  font-weight: 900;
  letter-spacing: 0;
  text-transform: uppercase;
}

h1,
h2,
p {
  margin-top: 0;
}

h1 {
  max-width: 850px;
  margin-bottom: 14px;
  font-size: clamp(32px, 4vw, 54px);
  line-height: 1.08;
  text-shadow: 0 8px 26px rgba(0, 75, 90, 0.12);
}

h2 {
  margin-bottom: 4px;
  font-size: 20px;
}

p {
  margin-bottom: 0;
  color: var(--muted);
  line-height: 1.58;
}

.lead {
  max-width: 820px;
  font-size: 17px;
}

.home-actions,
.toolbar,
.result-row {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 10px;
}

.home-actions {
  margin-top: 24px;
}

.home-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 18px;
  padding: 24px clamp(18px, 4vw, 54px) 18px;
}

.info-card,
.panel {
  position: relative;
  min-width: 0;
  overflow: hidden;
  border: 1px solid rgba(0, 167, 165, 0.24);
  border-radius: 8px;
  background:
    linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(246, 253, 252, 0.92)),
    rgba(255, 255, 255, 0.94);
  box-shadow: var(--shadow);
}

.info-card::before,
.panel::before {
  content: "";
  position: absolute;
  inset: 0 0 auto;
  height: 3px;
  background: linear-gradient(90deg, var(--cyan), var(--accent), transparent);
}

.info-card {
  padding: 22px;
}

.card-index {
  display: inline-flex;
  margin-bottom: 24px;
  color: var(--gold);
  font-size: 13px;
  font-weight: 900;
}

.two-column-layout {
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(330px, 430px);
  gap: 18px;
  padding: 24px clamp(18px, 4vw, 54px) 16px;
}

.two-column-layout > .panel:not(.key-panel) {
  grid-column: 1;
}

.key-panel {
  grid-column: 2;
  grid-row: 1 / span 2;
}

.panel {
  padding: 22px;
}

.stage-title {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  margin-bottom: 14px;
}

.step-dot {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  flex: 0 0 auto;
  width: 34px;
  height: 34px;
  border: 1px solid rgba(0, 167, 165, 0.28);
  border-radius: 8px;
  color: var(--accent-dark);
  background: linear-gradient(135deg, #ecfffd, var(--accent-soft));
  box-shadow: 0 0 20px rgba(0, 167, 165, 0.22);
  font-weight: 900;
}

.hero-badge {
  flex: 0 0 auto;
  border: 1px solid rgba(0, 167, 165, 0.24);
  border-radius: 8px;
  padding: 18px 20px;
  color: var(--accent-dark);
  background: linear-gradient(135deg, #ffffff, #e9fffd);
  box-shadow: var(--shadow);
  font-family: Consolas, "Cascadia Mono", "Microsoft YaHei", monospace;
  font-weight: 900;
}

.hero-badge.private {
  color: #7c2d12;
  background: var(--gold-soft);
}

textarea {
  width: 100%;
  min-height: 150px;
  resize: vertical;
  border: 1px solid rgba(0, 167, 165, 0.24);
  border-radius: 8px;
  padding: 14px;
  color: var(--ink);
  background:
    linear-gradient(90deg, rgba(0, 167, 165, 0.04) 1px, transparent 1px),
    linear-gradient(180deg, #ffffff, #f7fcfc);
  background-size:
    34px 34px,
    auto;
  line-height: 1.55;
  outline: none;
}

textarea:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(0, 167, 165, 0.16), 0 0 26px rgba(0, 167, 165, 0.12);
}

.key-box {
  min-height: 320px;
  margin: 8px 0 10px;
  font-family: Consolas, "Cascadia Mono", monospace;
  font-size: 12px;
}

label {
  display: block;
  margin-top: 16px;
  font-weight: 800;
}

button,
.button-link {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 42px;
  border: 0;
  border-radius: 8px;
  padding: 0 16px;
  color: #ffffff;
  background: linear-gradient(135deg, #00bdb8, var(--accent-dark));
  font-weight: 900;
  cursor: pointer;
  transition:
    transform 120ms ease,
    box-shadow 120ms ease,
    filter 120ms ease;
}

button:hover,
.button-link:hover {
  box-shadow: 0 12px 28px rgba(0, 167, 165, 0.3), 0 0 24px rgba(95, 247, 242, 0.24);
  filter: brightness(1.04);
  transform: translateY(-1px);
}

button:disabled {
  cursor: not-allowed;
  opacity: 0.58;
  transform: none;
  box-shadow: none;
}

.secondary,
.ghost,
.button-link.secondary {
  color: var(--accent-dark);
  border: 1px solid rgba(0, 167, 165, 0.28);
  background: #ffffff;
}

.secondary:hover,
.ghost:hover,
.button-link.secondary:hover {
  color: #ffffff;
  border-color: var(--accent);
  background: var(--accent);
}

.small,
.compact {
  min-height: 36px;
  padding: 0 12px;
}

.toolbar {
  margin-top: 12px;
}

.hint {
  color: var(--muted);
  font-size: 14px;
}

.status-pill {
  display: inline-flex;
  align-items: center;
  min-height: 32px;
  border-radius: 999px;
  padding: 5px 12px;
  color: var(--success);
  background: var(--success-soft);
  font-size: 14px;
  font-weight: 900;
}

.status-pill.neutral {
  color: var(--muted);
  background: #edf1f0;
}

.status-pill.error {
  color: var(--danger);
  background: var(--danger-soft);
}

.status-pill.success {
  color: var(--success);
  background: var(--success-soft);
}

code {
  color: var(--accent-dark);
  font-family: Consolas, "Cascadia Mono", monospace;
}

.app-footer {
  display: flex;
  justify-content: space-between;
  gap: 14px;
  padding: 0 clamp(18px, 4vw, 54px) 24px;
  color: var(--muted);
  font-size: 14px;
}

@media (max-width: 1040px) {
  .home-grid,
  .two-column-layout {
    grid-template-columns: 1fr;
  }

  .two-column-layout > .panel:not(.key-panel),
  .key-panel {
    grid-column: auto;
    grid-row: auto;
  }
}

@media (max-width: 720px) {
  .signature-bar,
  .top-nav,
  .page-hero,
  .app-footer {
    align-items: flex-start;
    flex-direction: column;
  }

  .top-nav {
    display: flex;
  }

  .page-hero {
    display: flex;
  }
}

    <script>
(function attachRsaEncryptLib(global) {
  const encoder = new TextEncoder();

  function getSubtleCrypto() {
    if (!global.crypto?.subtle) {
      throw new Error("当前浏览器不支持 Web Crypto API，请用 Chrome 或 Edge 打开本演示。");
    }
    return global.crypto.subtle;
  }

  function pemToArrayBuffer(pem, label) {
    const clean = pem
      .replace(`-----BEGIN ${label}-----`, "")
      .replace(`-----END ${label}-----`, "")
      .replace(/\s/g, "");
    const binary = atob(clean);
    const bytes = new Uint8Array(binary.length);

    for (let index = 0; index < binary.length; index += 1) {
      bytes[index] = binary.charCodeAt(index);
    }

    return bytes.buffer;
  }

  function arrayBufferToBase64(buffer) {
    const bytes = new Uint8Array(buffer);
    let binary = "";

    for (const byte of bytes) {
      binary += String.fromCharCode(byte);
    }

    return btoa(binary);
  }

  async function importPublicKey(publicKeyPem) {
    return getSubtleCrypto().importKey(
      "spki",
      pemToArrayBuffer(publicKeyPem, "PUBLIC KEY"),
      {
        name: "RSA-OAEP",
        hash: "SHA-256",
      },
      false,
      ["encrypt"],
    );
  }

  async function encryptText(publicKeyPem, plainText) {
    if (!plainText.trim()) {
      throw new Error("请先输入要加密的明文。");
    }

    const publicKey = await importPublicKey(publicKeyPem);
    const encrypted = await getSubtleCrypto().encrypt(
      { name: "RSA-OAEP" },
      publicKey,
      encoder.encode(plainText),
    );

    return arrayBufferToBase64(encrypted);
  }

  global.RsaEncryptLib = {
    importPublicKey,
    encryptText,
    pemToArrayBuffer,
    arrayBufferToBase64,
  };
})(window);

</script>

(function bootEncryptPage() {
  const sampleText = "RSA 演示消息：这是发送方准备加密的一段短消息。";
  const byteLimit = 190;

  const elements = {
    plainText: document.querySelector("#plainText"),
    cipherText: document.querySelector("#cipherText"),
    publicKey: document.querySelector("#publicKey"),
    encryptBtn: document.querySelector("#encryptBtn"),
    sampleBtn: document.querySelector("#sampleBtn"),
    sendToDecryptBtn: document.querySelector("#sendToDecryptBtn"),
    encryptStatus: document.querySelector("#encryptStatus"),
    plainHint: document.querySelector("#plainHint"),
    keyMeta: document.querySelector("#keyMeta"),
  };

  function setStatus(text, type = "neutral") {
    elements.encryptStatus.textContent = text;
    elements.encryptStatus.classList.toggle("success", type === "success");
    elements.encryptStatus.classList.toggle("error", type === "error");
    elements.encryptStatus.classList.toggle("neutral", type === "neutral");
  }

  function updateByteHint() {
    const byteLength = new TextEncoder().encode(elements.plainText.value).length;
    elements.plainHint.textContent = `${byteLength} 字节 / 建议不超过 ${byteLimit} 字节`;
    elements.plainHint.style.color = byteLength > byteLimit ? "#b42318" : "";
  }

  function loadKeys() {
    const keys = window.DEMO_RSA_KEYS;

    if (!keys?.publicKeyPem) {
      throw new Error("没有找到演示公钥，请先生成密钥。");
    }

    elements.publicKey.value = keys.publicKeyPem;
    elements.keyMeta.textContent = `公钥：${keys.modulusLength} 位，${keys.algorithm}，生成时间 ${keys.generatedAt}`;
  }

  function setBusy(isBusy) {
    elements.encryptBtn.disabled = isBusy;
    elements.sendToDecryptBtn.disabled = isBusy;
  }

  async function copyFrom(id) {
    const target = document.getElementById(id);
    if (!target) return;

    target.select();
    target.setSelectionRange(0, target.value.length);

    if (navigator.clipboard && window.isSecureContext) {
      await navigator.clipboard.writeText(target.value);
    } else {
      document.execCommand("copy");
    }
  }

  async function handleEncrypt() {
    try {
      setBusy(true);
      const byteLength = new TextEncoder().encode(elements.plainText.value).length;
      if (byteLength > byteLimit) {
        throw new Error(`明文 ${byteLength} 字节，超过本演示上限 ${byteLimit} 字节。`);
      }

      const start = performance.now();
      const cipherText = await window.RsaEncryptLib.encryptText(
        elements.publicKey.value,
        elements.plainText.value,
      );
      const end = performance.now();

      elements.cipherText.value = cipherText;
      localStorage.setItem("rsaDemoCipherText", cipherText);
      localStorage.setItem("rsaDemoPlainText", elements.plainText.value);
      setStatus(`加密完成，用时 ${(end - start).toFixed(1)} ms`, "success");
    } catch (error) {
      setStatus(error.message, "error");
    } finally {
      setBusy(false);
    }
  }

  function sendToDecryptPage() {
    if (!elements.cipherText.value.trim()) {
      setStatus("请先生成密文。", "error");
      return;
    }

    localStorage.setItem("rsaDemoCipherText", elements.cipherText.value.trim());
    window.location.href = "./decrypt.html";
  }

  function bindEvents() {
    elements.encryptBtn.addEventListener("click", handleEncrypt);
    elements.sampleBtn.addEventListener("click", () => {
      elements.plainText.value = sampleText;
      updateByteHint();
    });
    elements.sendToDecryptBtn.addEventListener("click", sendToDecryptPage);
    elements.plainText.addEventListener("input", updateByteHint);

    document.querySelectorAll("[data-copy]").forEach((button) => {
      button.addEventListener("click", async () => {
        const originalText = button.textContent;
        await copyFrom(button.dataset.copy);
        button.textContent = "已复制";
        window.setTimeout(() => {
          button.textContent = originalText;
        }, 1000);
      });
    });
  }

  try {
    loadKeys();
    bindEvents();
    elements.plainText.value = sampleText;
    updateByteHint();
    setStatus(window.crypto?.subtle ? "浏览器支持 RSA 加密" : "浏览器不支持 Web Crypto", window.crypto?.subtle ? "success" : "error");
  } catch (error) {
    setStatus(error.message, "error");
  }
})();

</script>
  </body>
</html>
